# MM 前端 Nginx —— 静态托管 + API/WS 反代到后端
#
# 关键：后端 REST + WS 合在一个 ASGI 进程（8901），所以两条 location 都指向 mm-backend:8901。

server {
  listen      80;
  server_name _;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  root  /usr/share/nginx/html;
  index index.html;

  # ─── SPA 入口（React Router） ─────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── 静态资源：强缓存（Vite 打包带 content hash，无需 revalidate）──
  location ~* \.(?:js|mjs|css|woff2?|ttf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
    expires      1y;
    access_log   off;
    add_header   Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ─── REST API 反代 ───────────────────────────────
  location /api/ {
    proxy_pass         http://mm-backend:8901;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_connect_timeout  10s;
    proxy_send_timeout     30s;
    proxy_read_timeout     30s;
  }

  # ─── WebSocket 反代（/ws/dashboard, /ws/logs） ─────
  location /ws/ {
    proxy_pass         http://mm-backend:8901;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

    # 长连接：心跳 20s，给足裕度
    proxy_read_timeout     3600s;
    proxy_send_timeout     3600s;
    proxy_connect_timeout  30s;
  }

  # ─── 后端健康探针透出（可选，方便宝塔 curl）───────
  location = /backend-health {
    proxy_pass http://mm-backend:8901/health;
    access_log off;
  }
}
