# ════════════════════════════════════════════════════════════════════
# 配置项 UI 元数据（前端 /settings 渲染控件完全依据本文件）
# ════════════════════════════════════════════════════════════════════
# 后端每新增一个 Tier 1 配置项，只要在这里登记即可，前端自动出控件。
# 未登记在这里的 key 视为 Tier 3（不给前端）。
#
# schema：
#   type:    number | int | bool | string | enum | percent | weight | array
#   min/max/step: 数字类
#   options: enum 类
#   group:   前端面板分组（对应大屏模块）
#   label:   UI 显示名
#   help:    提示文案（鼠标悬浮）
#   impact:  参数调大 / 调小的后果
#   danger:  true 表示"关键改动"，前端保存时二次确认
#   readonly: true 表示 Tier 2 只读
#   format:  特殊子类型（目前：color）
#   tier:    basic | expert（V1.1 · 小白/专家双模式，默认 expert）
#           - basic: 小白模式也会显示；推荐项 + 所有权重
#           - expert: 仅专家模式显示（阈值、细粒度参数、危险项）
#
# percent / weight 均为 0-1 浮点，只是前端分别渲染为百分比滑条和权重条

# ── 分组顺序（前端导航）──
