    label: "币种与采集"
  - id: radar
    label: "主力行为雷达"
  - id: phase
    label: "趋势阶段状态机"
  - id: capabilities
    label: "能力评分"
  - id: key_levels
    label: "关键位与磁吸"
  - id: trade_plan
    label: "交易建议"
  - id: ai
    label: "AI 观察"
  - id: system
    label: "系统"
  - id: ui
    label: "UI 偏好"

