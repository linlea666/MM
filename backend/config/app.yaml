app:
  name: MM
  version: 0.1.0
  env: development  # development | production

server:
  host: 0.0.0.0
  rest_port: 8901
  ws_port: 8902
  cors_origins:
    - "*"   # 自用

database:
  path: data/mm.sqlite
  logs_path: logs/mm-logs.sqlite      # 日志独立文件，避免阻塞业务事务
  wal_mode: true
  busy_timeout_ms: 5000

redis:
  enabled: false   # V1 不用
  host: localhost
  port: 6379

collector:
  global_rps: 5
  request_timeout_seconds: 30

  default_symbols: ["BTC"]
  timeframes: ["30m", "1h", "4h"]

  hfd_base_url: "https://dash.hfd.fund/api/pro/pro_data"

  kline_sources:
    primary: "binance"
    fallback: ["okx"]

  # 调度按 docs/upstream-api/README.md §4.3-4.4 去重后 + V1.1 扩展 7 个。
  # - Series 家族（fair_value/fvg/imbalance/liquidity_sweep/micro_poc/poc_shift）
  #   共享 cvd_series/imbalance_series/inst_vol_series/vwap_series 载荷，
  #   只拉 liquidity_sweep + micro_poc + poc_shift 即覆盖全部 6 个
  # - OrderBlocks 家族（trend_price/ob_decay）共享 order_blocks[] 载荷，
  #   只拉 trend_price 即覆盖 ob_decay
  # - cascade_liquidation / retail_stop_loss 顶层 key 也叫 order_blocks，
  #   但语义完全不同（爆仓区 vs 吸筹带），必须独立抓取
  schedule:
    kline_close:                    # K 线收盘后 5 秒触发
      - power_imbalance
      - trailing_vwap
      - trend_exhaustion
      - liquidity_sweep             # 同时白送 fair_value/fvg/imbalance 的 4 系列
      - micro_poc                   # Series 家族成员
      - poc_shift                   # Series 家族成员
      - cross_exchange_resonance
      - inst_choch                  # V1.1：事件型，反转/突破需要尽快响应
    every_5min:
      - trend_saturation
    every_30min:
      - smart_money_cost
      - trend_price                 # 同时白送 ob_decay 的 order_blocks[]
      - trend_purity
      - absolute_zones
      - trend_roi_exhaustion        # V1.1：波段四维（目标价）
      - max_pain_drawdown           # V1.1：波段四维（洗盘容忍）
      - time_exhaustion_window      # V1.1：波段四维（时间死亡线）
      - max_drawdown_tolerance      # V1.1：波段四维（移动护城河）
    every_1h:
      - liq_heatmap
      - liq_vacuum
      - liquidation_fuel
      - hvn_nodes
      - inst_volume_profile
      - cascade_liquidation         # V1.1：连环爆仓区（价位带）
      - retail_stop_loss            # V1.1：散户止损带（价位带）
    every_4h:
      - time_heatmap

  schedule_delay_seconds: 5         # K 线收盘后延迟，等 HFD 数据刷出

ai:
  enabled: false   # V1.1 启用
  provider: deepseek
  model: deepseek-chat
  base_url: "https://api.deepseek.com/v1"
  cache_ttl_minutes: 5
  observer_interval_minutes: 5

logging:
  level: INFO                      # DEBUG | INFO | WARNING | ERROR
  format: "[%(asctime)s] [%(levelname)s] %(name)s: %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  console: true
  file:
    enabled: true
    path: logs/mm.log
    max_size_mb: 100
    backup_count: 10
  sqlite:
    enabled: true
    min_level: INFO                # DEBUG 不入库
    retention_days: 7
  ws:
    enabled: true                  # Step 4 实装

stats:
  daily_review_hour_utc: 0         # V1.1 用，每日 00:00 UTC 触发
