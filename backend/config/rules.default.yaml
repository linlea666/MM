# ════════════════════════════════════════════════════════════════════
# 规则引擎出厂默认值（Git 可审查）
# ════════════════════════════════════════════════════════════════════
# 运行时 = 本文件 DEEP MERGE 数据库中的 config_overrides。
# 前端 / AI 只能改 config_overrides，不允许直接改 YAML。
# 字段元数据（类型 / 范围 / 文案）见 rules.meta.yaml。
# 一切阈值 / 权重 / 窗口 都放这里，代码里不准出现魔法数字。

# ─── 全局（引擎共享）───
global:
  lookback_bars: 120              # 结构特征窗口（斜率/CVD/VWAP）：最近 N 根
  recent_window_bars: 8           # 事件窗口（共振/猎杀/imbalance 占比）：最近 N 根
  near_price_pct: 0.006           # 关键位"贴近"阈值 ±0.6%
  merge_level_pct: 0.003          # 关键位聚合：0.3% 内视为同一位
  level_ladder_min_spacing_pct: 0.005  # 档间最小间距 0.5%
  # ——"连续 N 根" 判定窗（docs/upstream-api/endpoints/trend_exhaustion.md / power_imbalance.md）
  exhaustion_window_bars: 3
  power_imbalance_window_bars: 3
  # V1.1：💣 爆仓带 / 散户止损带 TopN（多空各取 N 条，按强度降序）
  band_topn: 5

# ════════════════════════════════════════════════════════════════════
# 能力评分（Capability Scores，统一 0-100）
# ════════════════════════════════════════════════════════════════════
capabilities:

  # ─── 多头吸筹分 ───
  accumulation:
    weights:
      fair_value_slope: 0.20        # fair_value 上行斜率
      poc_shift_up: 0.20            # poc_shift 重心上移
      imbalance_green: 0.15         # 最近 N 根 imbalance 绿占比
      cvd_slope_up: 0.15            # cvd 斜率为正
      near_support: 0.15            # 价格贴近 S1
      resonance_buy: 0.15           # 最近共振买方向
    thresholds:
      slope_epsilon: 0.0            # 斜率判正/负的死区
      imbalance_green_ratio: 0.6    # 绿占比阈值（≥ 得满分）
      resonance_min_count: 2        # 共振事件最少次数（≥ 得满分）
      poc_shift_min_pct: 0.002      # POC 累计上移 ≥ 0.2%
    label_bands:                    # 分数 → 语义标签
      very_strong: 80
      strong: 60
      neutral_low: 40
      weak: 20

  # ─── 空头派发分（与吸筹对称）───
  distribution:
    weights:
      fair_value_slope: 0.20
      poc_shift_down: 0.20
      imbalance_red: 0.15
      cvd_slope_down: 0.15
      near_resistance: 0.15
      resonance_sell: 0.15
    thresholds:
      slope_epsilon: 0.0
      imbalance_red_ratio: 0.6
      resonance_min_count: 2
      poc_shift_min_pct: 0.002
    label_bands:
      very_strong: 80
      strong: 60
      neutral_low: 40
      weak: 20

  # ─── 突破确认分 ───
  breakout:
    weights:
      level_pierced: 0.25           # 最近 N 根穿越关键位
      whale_resonance: 0.25
      power_imbalance: 0.15
      ob_decayed: 0.15              # order block 已衰减
      space_ahead: 0.20             # 突破方向前方有真空/fuel
      bos_confirm: 0.0              # V1.1：⚡ BOS 结构延续（默认关闭，开启后需同比减其他权重使总和=1）
    thresholds:
      pierce_atr_mult: 0.3          # 穿越幅度至少 0.3 * ATR（避免擦线）
      whale_resonance_count: 2      # ≥ 2 次共振判强
      power_imbalance_ratio: 1.5    # power_imbalance.ratio ≥ 此值算放大
      ob_decay_threshold: 0.6       # ob_decay 剩余 < 40% 视为已衰减
      bos_max_bars_since: 3         # V1.1：BOS 事件须在最近 N 根内才计入（越新越满分）
    label_bands:
      strong_real: 70
      weak_real: 40
      fake: 30

  # ─── 反转概率分 ───
  reversal:
    weights:
      sweep_recent: 0.30            # 最近 N 根 sweep 事件
      exhaustion_high: 0.25
      fair_value_diverge: 0.20
      liq_pierce_recover: 0.25      # 刺穿清算带后收回
      choch_reversal: 0.0           # V1.1：⚡ CHoCH 结构反转（默认关闭，开启后需同比减其他权重使总和=1）
      time_exhausted: 0.0           # V1.1：趋势时间极限（撞死亡线/越虚线，默认关闭）
      dd_pierce: 0.0                # V1.1：📌 移动护城河刺穿（默认关闭）
    thresholds:
      exhaustion_alert: 5           # trend_exhaustion ≥ 此值算高位
      exhaustion_consecutive_min: 3 # 连续 N 根同 type 同 ≥ alert 才给满分
      fair_value_diverge_pct: 0.01  # |price - fair_value| / fair_value ≥ 1%
      liq_recover_bars: 3           # 刺穿后 N 根内回到带内
      choch_max_bars_since: 3       # V1.1：CHoCH 事件须在最近 N 根内才计入（越新越满分）
    label_bands:
      very_high: 70
      high: 50
      medium: 30

  # ─── 关键位强度（单个 level 打分）───
  key_level_strength:
    source_weights:
      hvn: 40                       # HVN 节点
      absolute_zone: 20             # 密集博弈带
      fvg: 15                       # 真空区边缘
      micro_poc: 15                 # 微观成本
      smart_money: 10               # 主力成本
      trend_price: 10               # 订单块
      trailing_vwap: 10
      cascade_band: 25              # V1.1：💣 机构连环爆仓带（雷区插针）
      retail_band: 15               # V1.1：散户止损带（磁吸方向/破位追单）
      heatmap: 20                   # 清算带
    purity_bonus_max: 10            # trend_purity 纯度加分上限
    ob_decay_bonus_max: 10          # 未衰减加分上限
    test_count_decay:
      1: 1.0
      2: 0.85
      3: 0.65
      "4+": 0.4
    state_decay:
      first_test: 1.0
      multi_test: 0.8
      worn_out: 0.5
    label_bands:
      strong: 70
      medium: 40

  # ─── 流动性磁吸分（上下方各一个）───
  liquidity_magnet:
    weights:
      heatmap_intensity: 0.40
      fuel_strength: 0.30
      vacuum_pull: 0.20
      distance_close: 0.10
    thresholds:
      heatmap_min_intensity: 0.5
      fuel_min: 0.3
      max_distance_pct: 0.05        # 超过 5% 的目标忽略
    max_targets_per_side: 3

# ════════════════════════════════════════════════════════════════════
# 模块 1：主力行为雷达（9 标签触发规则）
# ════════════════════════════════════════════════════════════════════
main_force_radar:
  labels:
    # 注：accumulate / distribute 两条 label 不直接产出 alert（主标签由
    # 4 个 CapabilityScore 在 _pick_main 里决定），也不参与排序打分，
    # 因此只保留 require 硬门槛；已移除未接入的 soft 块。
    accumulate:
      require:
        accumulation_score_gte: 60
        distribution_score_lt: 30
    distribute:
      require:
        distribution_score_gte: 60
        accumulation_score_lt: 30
    support:                        # 护盘
      require:
        near_support: true
        whale_direction: buy
        imbalance_green: true
    suppress:                       # 压盘
      require:
        near_resistance: true
        whale_direction: sell
        imbalance_red: true
    pump:                           # 联合拉升
      require:
        resonance_count_gte: 3
        whale_direction: buy
        breakout_score_gte: 60
    dump:                           # 联合砸盘
      require:
        resonance_count_gte: 3
        whale_direction: sell
        breakout_score_gte: 60
    bull_trap:                      # 诱多
      require:
        just_broke_resistance: true
        whale_direction: sell
        power_imbalance_reverse: true
    bear_trap:                      # 诱空
      require:
        just_broke_support: true
        whale_direction: buy
        power_imbalance_reverse: true
    exhausted:                      # 衰竭
      require:
        exhaustion_gte: 7
        saturation_gte: 70
    brewing:                        # 变盘前夕
      require:
        cvd_converge: true          # 归一化后 |cvd_slope|/cvd_range < max_ratio
        vacuum_near: true
        active_session: true
      # 归一化阈值（跨币种可比）：值越小越严格。经验默认 0.2 = 净流入/流出 <= 20% 振幅
      cvd_converge_max_ratio: 0.2
  # 主标签从激活的 labels 里按 score 最大挑选，打平时按 priority 顺序
  priority_order:
    [pump, dump, accumulate, distribute, support, suppress,
     bull_trap, bear_trap, exhausted, brewing]

# ════════════════════════════════════════════════════════════════════
# 模块 2：趋势阶段状态机（8 阶段）
# ════════════════════════════════════════════════════════════════════
phase_state_machine:
  phases:
    bottom_accumulation:            # 底部吸筹震荡
      require:
        accumulation_score_gte: 55
        saturation_lt: 40
        breakout_score_lt: 50
    top_distribution:               # 高位派发震荡
      require:
        distribution_score_gte: 55
        saturation_gt: 60
        breakout_score_lt: 50
    real_breakout:                  # 真突破启动
      require:
        breakout_score_gte: 70
        reversal_score_lt: 50
    trend_continuation:             # 趋势延续
      require:
        breakout_score_between: [40, 70]
        participation: ["主力真参与", "局部参与"]
    fake_breakout:                  # 假突破猎杀
      require:
        reversal_score_gte: 60
        breakout_score_lt: 40
    trend_exhaustion:               # 趋势耗竭
      require:
        exhaustion_gte: 7
        saturation_gte: 70
    vacuum_acceleration:            # 黑洞加速
      require:
        vacuum_breached: true
        breakout_score_gte: 60
    chaotic:                        # 无序震荡（默认兜底）
      require: {}
  phase_score_threshold: 60         # 低于此值标 unstable

# ════════════════════════════════════════════════════════════════════
# 模块 3：主力参与确认
# ════════════════════════════════════════════════════════════════════
participation:
  resonance_window_bars: 8
  resonance_min_count: 2
  fair_value_diverge_pct: 0.005
  power_imbalance_extreme: 2.5      # ratio ≥ 此值算极端
  active_session_threshold: 0.5     # time_heatmap 当前小时活跃度 ≥ 此值
  levels:                           # 命中条件数量 → 结论
    "主力真参与": 4
    "局部参与": 2
    "疑似散户": 1
    "垃圾时间": 0

# ════════════════════════════════════════════════════════════════════
# 模块 4：关键位阶梯图
# ════════════════════════════════════════════════════════════════════
key_levels:
  merge_distance_pct: 0.003         # 0.3% 内合并
  min_spacing_pct: 0.005            # 档间最小间距 0.5%
  min_sources_for_show: 1           # 至少由 1 个来源支持才显示
  prefer_sources:                   # 聚合时优先展示的来源顺序
    [hvn, absolute_zone, smart_money, trend_price, micro_poc, fvg, heatmap, trailing_vwap]
  r_levels: 3
  s_levels: 3
  # V1.1 · 远距档（超出 R3/S3 之外的候选）
  far_range_pct_min: 0.01           # 远距下限：距当前价 ≥1%
  far_range_pct_max: 0.08           # 远距上限：距当前价 ≤8%（30m/1h 复盘友好）
  max_far_count: 8                  # 远距每侧最多显示 8 条（用户可上调到 20）
  suit_logic:
    first_test_strong: "反弹"       # 首测 + 强 → 反弹
    worn_out: "观望"
    decayed: "突破"

# ════════════════════════════════════════════════════════════════════
# 模块 5：流动性磁吸图（继承 capabilities.liquidity_magnet）
# ════════════════════════════════════════════════════════════════════
liquidity_map:
  dominant_diff: 10                 # 上下磁吸分差 ≥ 此值才判主方向
  neutral_band: 10                  # 否则标 neutral

# ════════════════════════════════════════════════════════════════════
# 模块 · Hero Strip（顶部 4 维度结论条）
# ════════════════════════════════════════════════════════════════════
hero:
  choch_alert_bars: 3               # V1.1：⚡ CHoCH/BOS 在最近 N 根内命中时，在 market_structure 以闪电角标呈现

# ════════════════════════════════════════════════════════════════════
# 模块 6：交易建议（V1 规则输出，3 情景）
# ════════════════════════════════════════════════════════════════════
trade_plan:
  stars:                            # 总分 → 星级
    1: 20
    2: 40
    3: 60
    4: 75
    5: 90
  entry_zone_pct: 0.004             # 入场区间宽度：± 0.4%
  stop_buffer_pct: 0.003            # 止损缓冲：目标位再外扩 0.3%
  target_ratios: [1.5, 3.0]         # T1 / T2 的盈亏比
  position_size:
    light_max_stars: 2              # ≤ 此星级标轻仓
    heavy_min_stars: 4              # ≥ 此星级标重仓
  use_segment_portrait: false       # V1.1：是否用波段四维（ROI/Pain/Time/DdTolerance）覆盖止盈止损（默认关闭）
  veto:
    exhaustion: 7                   # exhaustion ≥ 此值否决顺势追入
    purity: 30                      # trend_purity < 此值降级
    active_session: 0.3             # time_heatmap 活跃度 < 此值降级
    time_exhausted: false           # V1.1：bars_to_max ≤ 0（已撞死亡线）→ 强制观望（默认关闭）
    dd_pierced: false               # V1.1：📌 护城河刺穿次数 ≥ 1 → 强制观望（默认关闭）

# ════════════════════════════════════════════════════════════════════
# AI 观察模式（V1.0 遗留占位，未被消费；V1.1 Phase 9 的新结构在下方 ai.*）
# ════════════════════════════════════════════════════════════════════
ai_observer:
  enabled: false                    # V1 暂不启用
  trigger:
    conflict_score_gap: 30          # 能力分互相打架（≥ 差值）触发
    attention_min: 50               # 低于此值不送 AI
  attention_bands:
    low: 30
    medium: 60
    high: 80
  max_observations_per_run: 3

# ════════════════════════════════════════════════════════════════════
# V1.1 · Phase 9 · AI 观察模式（统一模型：L1 趋势分类 → L2 资金解读 → [条件触发] L3 交易计划）
# ════════════════════════════════════════════════════════════════════
ai:
  enabled: false                    # 默认关闭；前端 /settings 开启
  provider: "deepseek"              # "deepseek" | "stub"
  api_key: ""                       # secret：前端 password 输入，全链路 mask 显示
  base_url: "https://api.deepseek.com"

  # V1.1 · 统一模型（不再 Hybrid）：三层全部用选中的 tier；默认 flash（省）
  model_tier: "flash"               # "flash" | "pro"
  thinking_enabled: false           # 思维模式；官方 thinking 与 json_object 互斥，
                                    # 开启后 provider 会自动关 json_object+temperature，
                                    # 靠 prompt 强约束 + 解析兜底输出 JSON；慢 2x-3x。

  flash_model: "deepseek-v4-flash"  # 具体模型名（expert 字段，可覆盖官方）
  pro_model: "deepseek-v4-pro"
  proxy: ""                         # 可选：socks5://user:pass@host:port 或 http://host:port

  # —— 触发 / 冷却 / 缓存 ——
  observer:
    min_interval_seconds: 180       # 两次触发最小间隔（防连发）
    cache_ttl_seconds: 300          # 相同 anchor_ts 的结果缓存窗
    # —— Layer 3（交易计划）自动升级阈值 ——
    auto_trade_plan: true           # 达阈值时自动调 pro 出计划；关掉则只靠"求交易计划"按钮手动触发
    auto_trend_confidence: 0.70     # L1 置信度 ≥ 此值
    auto_money_flow_confidence: 0.60  # L2 置信度 ≥ 此值
    timeout_s_flash: 20.0
    timeout_s_pro: 45.0
    temperature_flash: 0.2
    temperature_pro: 0.15

  # —— 存储 ——
  storage:
    history_ring_size: 50           # 内存环形缓冲大小（REST/WS 的最近 N 条）
    jsonl_relpath: "data/ai_observations.jsonl"  # 相对 backend/ 的持久化文件

# ════════════════════════════════════════════════════════════════════
# V1.1 · Step 7 · 动能能量柱 + 目标投影
# 详见 docs/dashboard-v1/MOMENTUM-PULSE.md
# ════════════════════════════════════════════════════════════════════
momentum_pulse:
  thresholds:
    power_imbalance_min_ratio: 1.5      # 单根 power_imbalance |ratio| ≥ 此值算"放大"
    power_imbalance_streak_full: 3      # streak 达到此值即满分
    resonance_min_count: 2              # 共振计数到此值即满分
    atr_break_min: 0.3                  # pierce_atr_ratio ≥ 此值算"真穿越"
    saturation_mid: 50                  # progress ≥ 此值算"半满"，触发 fatigue=mid
    override_max_bars: 3                # 事件抢跑窗口（≤ N 根算"刚刚"）
    min_dominant_gap: 10                # 多空分差 ≥ 此值才标 dominant
  weights:                              # 6 个分量权重，总和 = 100
    power_imbalance: 25
    pi_streak: 20
    cvd_slope: 20
    resonance: 15
    imbalance_ratio: 10
    pierce: 10
  fatigue_decay:                        # confidence 折扣（参见 §3.3 公式）
    fresh: 0.0
    mid: 0.2
    exhausted: 0.5

target_projection:
  max_distance_pct: 0.08                # 8% 之外的目标过滤
  max_bars_clip: 50                     # bars_to_arrive 上限
  per_side_topn: 5                      # 每侧最多保留 N 个 item
  source_weights:                       # confidence 公式中的来源固有权重
    roi: 0.90
    pain: 0.85
    cascade_band: 0.65
    heatmap: 0.70
    vacuum: 0.50
    nearest_level: 0.60

# ════════════════════════════════════════════════════════════════════
# UI 偏好（前端 /settings 可改，不影响后端行为）
# ════════════════════════════════════════════════════════════════════
ui:
  refresh_ms: 5000
  # V1.1 · 大屏主题：command_center = 作战指挥（偏赛博青蓝），dark/light 保留兼容
  theme: "command_center"
  # V1.1 · 自定义主色（仅 command_center 主题生效；前端 <input type="color"> 渲染）
  theme_primary_hex: "#16D9E3"         # 作战主色：赛博青
  theme_accent_hex: "#58A6FF"          # 辅助蓝：次要信息 / 坐标角标
  theme_background_hex: "#0A1628"      # 深海黑蓝底色
  cards:
    main_force_radar: true
    phase_state_machine: true
    participation: true
    key_levels: true
    liquidity_map: true
    trade_plan: true
